name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend tests (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: husfelag
          POSTGRES_PASSWORD: husfelag
          POSTGRES_DB: husfelag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://husfelag:husfelag@localhost:5432/husfelag
      SECRET_KEY: ci-test-secret-key
      DJANGO_ENV: development
    defaults:
      run:
        working-directory: HusfelagPy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Generate test Fernet key
        run: echo "BANK_FERNET_KEY=$(poetry run python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"
      - name: Run tests
        run: poetry run pytest -q

  frontend:
    name: Frontend build (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HusfelagJS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: HusfelagJS/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: CI=true npm run build
